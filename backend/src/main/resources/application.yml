spring:
  datasource:
    url: jdbc:h2:file:./data/villa-reservation;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082
  servlet:
    context-path: /villa

# 자연어 어시스턴트(Claude) 연계 — 키는 환경변수로 주입(코드/yml 평문 금지)
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-opus-4-8
  base-url: https://api.anthropic.com
  version: "2023-06-01"
  max-tokens: 1024
  max-tool-loops: 5
  timeout-ms: 30000
